spring:
  application:
    name: netBankingBackend

  datasource:
    url: jdbc:postgresql://localhost:5432/netBankingDB
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE