spring:
  application:
    name: netBankingBackend
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: Asia/Kolkata
logging:
  level:
#    org.hibernate.SQL: DEBUG
#    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    com:
      banking:
        netBankingBackend:



server:
  servlet:
    session:
      cookie:
        same-site: strict


jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}


aes:
  secret:
    key: ${AES_SECRET_KEY}

hmac:
  secret:
    key: ${HMAC_SECRET_KEY}



