spring:
  application:
    name: netBankingBackend
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 150      # Increases concurrent DB connections
      connection-timeout: 30000   # Max time (ms) to wait for a connection
      minimum-idle: 20            # Keeps connections ready for sudden spikes

  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: Asia/Kolkata
logging:
  level:
#    org.hibernate.SQL: DEBUG
#    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    com:
      banking:
        netBankingBackend:



server:
  servlet:
    session:
      cookie:
        same-site: strict
  tomcat:
    threads:
      max: 400            # Increases the maximum worker threads
      min-spare: 50       # Minimum threads kept alive
    accept-count: 200     # How many requests can queue up when all threads are busy
    connection-timeout: 20000 # Time (ms) Tomcat waits for a client to send the reques


jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}


aes:
  secret:
    key: ${AES_SECRET_KEY}

hmac:
  secret:
    key: ${HMAC_SECRET_KEY}

razorpay:
  key-id: ${RAZORPAY_KEY_ID}
  key-secret: ${RAZORPAY_KEY_SECRET}
  verify-signature: false


