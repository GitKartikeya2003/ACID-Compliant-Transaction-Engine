spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/netBankingDB
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: Asia/Kolkata

  data:
    redis:
      host: localhost
      port: 6379