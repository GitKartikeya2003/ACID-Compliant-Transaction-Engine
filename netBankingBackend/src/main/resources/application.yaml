spring:
  application:
    name: netBankingBackend
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      lettuce:
        pool:
          max-active: 50      # max concurrent Redis connections (matches Tomcat max-threads)
          max-idle: 20        # keep this many warm connections alive
          min-idle: 10        # pre-warm on startup to avoid cold-start latency
          max-wait: 2000ms    # fail fast rather than queuing indefinitely

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      # Little's Law: 100 users × avg ~150ms DB time = ~15 concurrent DB connections.
      # 30 gives 2× headroom without exhausting Postgres max_connections.
      maximum-pool-size: 30
      minimum-idle: 15            # keep 15 warm — avoids new-connection overhead under burst
      connection-timeout: 8000    # fail fast
      max-lifetime: 1800000
      idle-timeout: 600000        # 10 min
      leak-detection-threshold: 5000  # log connections held > 5s (helps diagnose slow queries)
  fraud-datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 15
      minimum-idle: 2
      connection-timeout: 5000
      max-lifetime: 1800000

  jpa:
    open-in-view: false    # CRITICAL: prevents the OSIV Session from sharing stale
                           # entity state across the pre-validation → lock-acquisition boundary
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: Asia/Kolkata
          batch_size: 50          # batch INSERTs/UPDATEs — useful for seeder and bulk ops
          fetch_size: 100         # stream results in chunks rather than loading all at once
        order_inserts: true       # reorder to maximise batching efficiency
        order_updates: true

logging:
  level:
    com:
      banking:
        netBankingBackend:

server:
  servlet:
    session:
      cookie:
        same-site: strict
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
    min-response-size: 1024   # only compress responses > 1KB (avoid overhead on tiny responses)
  tomcat:
    threads:
      max: 100            # 1:1 with concurrent users — avoids queueing at the HTTP layer
      min-spare: 25       # warm thread pool; was 20
    accept-count: 100     # queue up to 100 additional requests before refusing (was 50)
    connection-timeout: 20000

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}


aes:
  secret:
    key: ${AES_SECRET_KEY}

hmac:
  secret:
    key: ${HMAC_SECRET_KEY}

razorpay:
  key-id: ${RAZORPAY_KEY_ID}
  key-secret: ${RAZORPAY_KEY_SECRET}
  verify-signature: false