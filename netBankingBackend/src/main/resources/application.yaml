spring:
  application:
    name: netBankingBackend
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 60       # Keep below local Postgres max_connections
      minimum-idle: 10            # Warm connections without exhausting Postgres
      connection-timeout: 10000   # Fail fast instead of waiting 30s under saturation
      max-lifetime: 1800000
  fraud-datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 15
      minimum-idle: 2
      connection-timeout: 5000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: Asia/Kolkata
logging:
  level:
    #    org.hibernate.SQL: DEBUG
    #    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    com:
      banking:
        netBankingBackend:



server:
  servlet:
    session:
      cookie:
        same-site: strict
  compression:
    enabled: true
  tomcat:
    threads:
      max: 80             # Keep app concurrency aligned with DB pool capacity
      min-spare: 20       # Minimum threads kept alive
    accept-count: 50      # Queue briefly instead of allowing huge request pileups
    connection-timeout: 20000 # Time (ms) Tomcat waits for a client to send the reques


jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}


aes:
  secret:
    key: ${AES_SECRET_KEY}

hmac:
  secret:
    key: ${HMAC_SECRET_KEY}

razorpay:
  key-id: ${RAZORPAY_KEY_ID}
  key-secret: ${RAZORPAY_KEY_SECRET}
  verify-signature: false